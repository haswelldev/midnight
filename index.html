<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Calculator</title>
    <script type="module" src="/src/main.ts"></script>
  </head>
  <body>
    <div class="lang-bar">
      <select id="lang-select" aria-label="Language"></select>
    </div>

    <main>
      <header>
        <h1 data-i18n="pageTitle">Midnight Calculator</h1>
        <p class="subtitle" data-i18n="subtitle">Find out when in-game midnight occurs in real life</p>
      </header>

      <section id="inputs">
        <div class="input-group">
          <label for="game-time" data-i18n="labelGameTime">Current in-game time</label>
          <input id="game-time" type="time" required />
        </div>

        <div class="input-group">
          <label for="timezone-select" data-i18n="labelTimezone">Your timezone</label>
          <select id="timezone-select"></select>
        </div>

        <div class="input-group">
          <label for="date-picker" data-i18n="labelDate">Date</label>
          <input id="date-picker" type="date" />
        </div>

        <button id="calculate-btn" type="button" data-i18n="btnCalculate">Calculate</button>
      </section>

      <section id="results" hidden>
        <h2><span data-i18n="gameMidnightsOn">Game midnights on</span> <span id="results-date"></span></h2>
        <p class="hint" data-i18n="hintClickSlot">Click a time slot to get Discord timestamps</p>
        <ul id="results-list"></ul>
      </section>
    </main>

    <dialog id="modal">
      <div class="modal-header">
        <h3 id="modal-title">Discord Timestamps</h3>
        <button id="modal-close" type="button" aria-label="Close">&times;</button>
      </div>
      <div id="modal-content"></div>
    </dialog>
  </body>
</html>
